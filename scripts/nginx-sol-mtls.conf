# SOL mTLS terminator
# Listens on 9321, requires a client cert chained to /etc/sol/ca/sol-ca.crt,
# and proxies the verified request to SOL on 127.0.0.1:9320 with two trust
# headers that SOL's auth dependency reads.
#
# Install:
#   sudo cp surgecore-nginx-sol-mtls.conf /etc/nginx/sites-available/sol-mtls
#   sudo ln -sf /etc/nginx/sites-available/sol-mtls /etc/nginx/sites-enabled/sol-mtls
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 9321 ssl;
    listen [::]:9321 ssl;
    http2 on;
    server_name sol.surgecore.internal;

    ssl_certificate     /etc/sol/server/sol-server.crt;
    ssl_certificate_key /etc/sol/server/sol-server.key;

    ssl_client_certificate /etc/sol/ca/sol-ca.crt;
    ssl_verify_client      on;
    ssl_verify_depth       2;

    # Reasonable mTLS defaults
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Keep nginx access log; rotate via standard /var/log/nginx logrotate.
    access_log /var/log/nginx/sol-mtls-access.log;
    error_log  /var/log/nginx/sol-mtls-error.log warn;

    # Sane upload + timeout defaults for an API server.
    client_max_body_size 4m;
    proxy_read_timeout   60s;
    proxy_connect_timeout 5s;

    location / {
        proxy_pass http://127.0.0.1:9320;

        # Identity headers SOL's auth dependency consumes.
        proxy_set_header X-Client-CN              $ssl_client_s_dn_cn;
        proxy_set_header X-Client-Cert-Verified   $ssl_client_verify;
        proxy_set_header X-Client-Cert-Serial     $ssl_client_serial;
        proxy_set_header X-Client-Cert-Fingerprint $ssl_client_fingerprint;

        # Standard pass-through headers.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
