name: test
on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e .[dev]
      - name: pytest
        env:
          SOL_ENVIRONMENT: dev
          SOL_DATABASE_URL: postgresql+psycopg2://sol:sol@127.0.0.1:5432/none
        run: pytest -q tests/unit
